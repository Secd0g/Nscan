scanner:
  name: "node-1"             # 节点名称（同一网络内唯一）
  server_addr: "localhost:9000"  # 服务端 gRPC 地址
  token: "change-me-in-production"
  max_tasks: 5               # 最大并发扫描任务数
  capabilities:              # 该节点支持的扫描类型
    - search
    - subdomain
    - shuffledns
    - bbot
    - findomain
    - port
    - http
    - crawler
    - nuclei
    - brute
    - dir
    - sensitive
    - ai-pentest
  tls:
    enabled: true
    ca_file: "certs/ca.crt"
    insecure_skip_verify: true

  # Phase 3: subtask queue worker (optional)
  # Set redis_addr to enable BLPop-based distributed subtask execution.
  # num_workers controls goroutines per capability (0 = disabled).
  queue:
    redis_addr: ""      # e.g. "localhost:6380"
    redis_pass: ""
    num_workers: 0      # set > 0 to enable queue mode on this node

log:
  level: "info"
  format: "console"
