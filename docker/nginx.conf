server {
    listen 80;
    server_name _;

    # /assets is both a Vue route and Vite's static asset directory.  Handle
    # the route itself explicitly so a browser refresh serves the SPA instead
    # of nginx trying (and failing) to list /usr/share/nginx/html/assets/.
    location = /assets {
        root /usr/share/nginx/html;
        try_files /index.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Clear-Site-Data '"cache"' always;
    }

    location = /assets/ {
        root /usr/share/nginx/html;
        try_files /index.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Clear-Site-Data '"cache"' always;
    }

    # Frontend static files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket proxy
    location /ws/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # Health check
    location /healthz {
        proxy_pass http://127.0.0.1:8080;
    }

    # Images
    location /images/ {
        proxy_pass http://127.0.0.1:8080;
    }
}
